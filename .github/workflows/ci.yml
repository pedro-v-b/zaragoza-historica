name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    name: Frontend (typecheck + tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend (syntax + import check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend_python
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend_python/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check (all .py files)
        run: python -m compileall -q .

      - name: Import smoke test
        env:
          JWT_SECRET_KEY: ci-dummy-secret-not-used-in-production-abcdef1234567890
          ADMIN_PASSWORD: ci-dummy-password
          DB_HOST: localhost
          DB_NAME: ci
          DB_USER: ci
          DB_PASSWORD: ci
        run: python -c "import main; print('import OK')"
